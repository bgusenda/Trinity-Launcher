name: Empaquetar AppImage (Portable)

on:
  push:
    branches: [ appimage-rebase, master ]
  pull_request:
    branches: [ appimage-rebase, master ]
  workflow_dispatch:
jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates build-essential git curl cmake clang ninja-build \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev qt6-webengine-dev qt6-svg-dev qt6-tools-dev \
            libcurl4-openssl-dev libssl-dev libasound2-dev libpulse-dev libjack-jackd2-dev \
            libpipewire-0.3-dev libsndio-dev libx11-dev libxi-dev libxext-dev libxfixes-dev \
            libxcursor-dev libxrandr-dev libxss-dev libxtst-dev libgl1-mesa-dev libegl1-mesa-dev \
            libgles2-mesa-dev libvulkan-dev vulkan-validationlayers libdrm-dev libgbm-dev \
            libudev-dev libevdev-dev libusb-1.0-0-dev libdbus-1-dev libbluetooth-dev bluez \
            libibus-1.0-dev libxkbcommon-dev libpng-dev libzip-dev libcups2-dev \
            libwayland-dev libunwind-dev libdecor-0-dev \
            libfuse2 wget file

      - name: Preparar estructura AppDir
        run: |
          mkdir -p APPIMAGE-TRINITY
          curl -L https://github.com/Trinity-LA/Trinity-Launcher/releases/download/2.6-beta/trinity-files.tar.gz -o trinity-files.tar.gz
          tar -xvf trinity-files.tar.gz -C APPIMAGE-TRINITY/
          
          # Limpieza de binarios problemáticos
          rm -f APPIMAGE-TRINITY/usr/bin/mcpelauncher-webview

      - name: Integrar Librerías Físicas (Portabilidad Total)
        run: |
          mkdir -p APPIMAGE-TRINITY/usr/lib
          
          # Buscamos la librería libzip en el sistema
          LIBZIP_REAL=$(find /usr/lib/x86_64-linux-gnu -name "libzip.so*" -type f | head -n 1)
          
          # COPIA FÍSICA: Esto evita errores de permisos en 'strip' y asegura la portabilidad
          cp -v "$LIBZIP_REAL" APPIMAGE-TRINITY/usr/lib/libzip.so.5
          
          # Aseguramos que el archivo tenga permisos de escritura para que linuxdeploy pueda usar 'strip'
          chmod +w APPIMAGE-TRINITY/usr/lib/libzip.so.5

      - name: Crear script AppRun
        run: |
          cat << 'EOF' > APPIMAGE-TRINITY/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export QT_QPA_PLATFORM="xcb"
          export GDK_BACKEND="x11"
          export DISABLE_WAYLAND=1
          export MCPELAUNCHER_DATA_DIR="$HERE/usr/share/mcpelauncher"
          export PATH="$PATH:$HERE/usr/bin"
          exec "$HERE/usr/bin/trinity" "$@"
          EOF
          chmod +x APPIMAGE-TRINITY/AppRun

      - name: Descargar linuxdeploy y plugin Qt
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
      - name: Instalar Qt 6.10
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          # Asegúrate de incluir los módulos que usa trinity
          modules: 'qtwebengine qtsvg qtdeclarative qttools'
      - name: Ejecutar empaquetado
        run: |
          # install-qt-action configura el PATH automáticamente, 
          # así que 'which qmake' devolverá la versión 6.10
          export QMAKE=$(which qmake)
          
          # Mantenemos tu lógica de librerías locales
          export LD_LIBRARY_PATH=$PWD/APPIMAGE-TRINITY/usr/lib:$LD_LIBRARY_PATH
          
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir APPIMAGE-TRINITY \
            --desktop-file APPIMAGE-TRINITY/usr/share/applications/com.trench.trinity.launcher.desktop \
            --icon-file APPIMAGE-TRINITY/usr/share/icons/hicolor/scalable/apps/com.trench.trinity.launcher.svg \
            --plugin qt \
            --output appimage

      - name: Subir AppImage resultante
        uses: actions/upload-artifact@v4
        with:
          name: Trinity-Launcher-AppImage
          path: "*.AppImage"
